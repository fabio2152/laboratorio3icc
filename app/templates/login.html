<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesion &middot; Tienda MVC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); min-height: 100vh; }
    .login-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    .login-body { padding: 2rem 2.5rem 2.5rem; }
    .form-control { border-radius: 10px; padding: 0.75rem 1rem; }
    .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 0.2rem rgba(99,102,241,0.2); }
    .input-group-text { border-radius: 10px 0 0 10px; background: #f8f9ff; border-color: #dee2e6; }
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 15px rgba(79,70,229,0.4);
      transition: all .2s;
    }
    .btn-login:hover { box-shadow: 0 6px 20px rgba(79,70,229,0.5); transform: translateY(-1px); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="w-100" style="max-width: 420px; padding: 1rem;">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card login-card">
      <div class="login-header">
        <div class="mb-3">
          <span style="background:rgba(255,255,255,0.2);border-radius:50%;width:70px;height:70px;display:inline-flex;align-items:center;justify-content:center;">
            <i class="bi bi-bag-check-fill text-white" style="font-size:2rem;"></i>
          </span>
        </div>
        <h4 class="text-white fw-bold mb-1">Tienda MVC</h4>
        <p class="text-white opacity-75 small mb-0">Panel de administracion</p>
      </div>

      <div class="login-body">
        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold text-muted small text-uppercase">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="Tu usuario" autofocus autocomplete="username" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold text-muted small text-uppercase">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Tu contraseña" autocomplete="current-password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-login text-white w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesion
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-white opacity-50 small mt-4">
      Flask MVC + Repository + Services
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
